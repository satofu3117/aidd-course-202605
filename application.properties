# ============================================================================
#  AIDD Training - application.properties
# ============================================================================
#  研修プロジェクトのアプリケーション設定。
#  Day 3 以降、各自の実装に応じてここを書き換えていきます。
# ============================================================================

spring.application.name=library-app

# ----------------------------------------------------------------------------
#  データソース(H2 in-memory)
# ----------------------------------------------------------------------------
#  研修ではデフォルトで H2 in-memory を使います。アプリ再起動でデータは消えます。
#  PostgreSQL 等に切り替える場合は datasource.url / driver-class-name を変更し、
#  build.gradle.kts の runtimeOnly に該当ドライバを追加してください。
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 コンソール(http://localhost:8080/h2-console で DB の中身を確認できる)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------------------------------------------
#  JPA / Hibernate
# ----------------------------------------------------------------------------
#  ddl-auto=update: エンティティの追加・変更を自動的にスキーマに反映
#                   (本番では絶対に使わないが、研修では便利)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ----------------------------------------------------------------------------
#  Actuator(環境構築チェックリスト STEP 5-2 の /actuator/health で使用)
# ----------------------------------------------------------------------------
#  研修目的のため health と info のみ公開。本番ではさらに絞り込むこと。
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ----------------------------------------------------------------------------
#  ログ
# ----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.training.aidd=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# ----------------------------------------------------------------------------
#  Lv3 で Virtual Threads を有効化する場合は以下のコメントを外す
# ----------------------------------------------------------------------------
# spring.threads.virtual.enabled=true
